interface:
  display_name: "ClawHub WhiteBIT Trading"
  short_description: "Manage and run WhiteBIT trading via ClawHub"
  default_prompt: "Use $clawhub-whitebit-trading to manage and execute WhiteBIT trading workflows through ClawHub and OpenClaw with MCP-first validation."
dependencies:
  tools:
    - type: "mcp"
      value: "whitebit-docs"
      description: "WhiteBIT documentation MCP server for endpoint and auth validation."
      transport: "streamable_http"
      url: "https://docs.whitebit.com/mcp"
policy:
  allow_implicit_invocation: true
